# ==============================================================================
# Project Horizons — Complete Stage Definitions
# ==============================================================================
# Used by ProgressiveStages for FTB Quests gating, EMI item locking,
# and FTB Teams shared-stage sync.
#
# Synced bidirectionally with AStages (KubeJS .stages API) via
# kubejs/server_scripts/progression/stage_bridge.js
#
# Stage naming convention:
#   act_      — narrative progress gates
#   branch_   — mutually exclusive quest branch choices
#   path_     — perk tree identity
#   gate_     — dungeon floor / tier progression
#   level_    — Pathfinder level milestones
#   unlock_   — content unlocks (brewing, cooking, etc.)
#   rep_      — faction reputation milestones
#   crime_    — crime system states
#   ascend_   — ascension eligibility and class unlocks
#   subtree_  — ascension subtree tier progression
#   trial_    — ascension trial completion / state
#   title_    — cosmetic title grants
#   quest_    — quest completion event triggers
#   gym_      — Cobblemon gym badge progression
#   perk_     — perk point milestones
#   nutrition_ — nutrition tier states
#   discovered_ — world location discovery
#   encounter_ — world encounter tracking
#   crisis_   — world crisis event tracking
#   festival_ — seasonal festival tracking
#   season_   — calendar season tracking
#   wevent_   — world event tracking
#   loc_      — location state tracking
#   sigil_    — ascension sigil equip tracking
#   caravan_  — trade caravan tracking
#   village_  — village condition tracking
#   companion_ — Cobblemon companion ability tracking
#   bounty_   — bounty hunter system
#   sidechain_ — side quest chain capstones
#
# Source: Compiled from all 53 KubeJS server_scripts via grep
# ==============================================================================


# ==============================================================================
# ACT STAGES — Narrative / Story Progression
# ==============================================================================
# Granted as the player progresses through the 4-act main questline.

[stages.act_1_started]
name = "Act 1 Started"
description = "Player has begun the main questline in Anchor Town."
dependencies = []

[stages.act_1_complete]
name = "Act 1 Complete"
